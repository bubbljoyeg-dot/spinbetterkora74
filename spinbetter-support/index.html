<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مركز الدعم الفني | SpinBetter</title>
  
  <link rel="stylesheet" href="../assets/css/style.css?v=2024">
  <script src="../analytics_and_cookies.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/support-ticket.js?v=2024" defer></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    /* Premium Support UI Styles */
    :root {
        --sp-bg: #0f172a;
        --sp-card-bg: rgba(30, 41, 59, 0.7);
        --sp-accent: #38bdf8;
        --sp-accent-glow: rgba(56, 189, 248, 0.4);
        --sp-text: #f8fafc;
        --sp-text-muted: #94a3b8;
        --sp-border: rgba(255, 255, 255, 0.08);
        --sp-danger: #ef4444;
        --sp-success: #22c55e;
    }
    
    body {
        background-color: var(--sp-bg);
        background-image: radial-gradient(circle at top right, rgba(56,189,248,0.1) 0%, transparent 40%),
                          radial-gradient(circle at bottom left, rgba(14,165,233,0.15) 0%, transparent 40%);
        background-attachment: fixed;
        color: var(--sp-text);
        font-family: 'Tajawal', sans-serif;
        margin: 0; padding: 0; min-height: 100vh;
    }
    
    .sp-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        box-sizing: border-box;
    }
    
    .sp-card {
        background: var(--sp-card-bg);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--sp-border);
        border-radius: 24px;
        width: 100%;
        max-width: 600px;
        padding: 40px;
        box-shadow: 0 30px 60px -15px rgba(0,0,0,0.6);
        position: relative;
        overflow: hidden;
    }
    
    /* Decoration Line */
    .sp-card::before {
        content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
        background: linear-gradient(90deg, transparent, var(--sp-accent), transparent);
        opacity: 0.8;
    }
    
    .sp-header {
        text-align: center; margin-bottom: 35px;
    }
    .sp-header h1 {
        font-size: 28px; font-weight: 900; margin: 0 0 10px; color: #fff;
        display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .sp-header h1 span { color: var(--sp-accent); }
    .sp-header p {
        color: var(--sp-text-muted); font-size: 15px; margin: 0;
    }
    
    /* Tabs */
    .sp-tabs {
        display: flex; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 16px; margin-bottom: 30px;
    }
    .ticket-tab {
        flex: 1; text-align: center; padding: 14px; font-size: 15px; font-weight: 700; color: var(--sp-text-muted);
        border-radius: 12px; cursor: pointer; transition: all 0.3s; user-select: none;
    }
    .ticket-tab.active {
        background: var(--sp-accent); color: #000; box-shadow: 0 4px 15px var(--sp-accent-glow);
    }
    
    /* Content Sections */
    .ticket-tab-content { display: none; animation: spFadeIn 0.4s ease; }
    .ticket-tab-content.active { display: block; }
    
    @keyframes spFadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    /* Form Elements */
    .sp-form-group { margin-bottom: 22px; }
    .sp-form-group label {
        display: block; margin-bottom: 8px; font-size: 14px; font-weight: 700; color: #e2e8f0;
    }
    .sp-form-group label span { color: var(--sp-danger); margin-right: 4px; }
    
    .sp-input, .sp-select, .sp-textarea {
        width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.4); border: 2px solid transparent;
        border-bottom: 2px solid var(--sp-border); color: #fff; border-radius: 12px;
        padding: 16px; font-family: 'Tajawal', sans-serif; font-size: 15px; outline: none; transition: all 0.3s;
    }
    .sp-select option { background: #0f172a; }
    .sp-input:focus, .sp-select:focus, .sp-textarea:focus {
        background: rgba(0,0,0,0.6); border-bottom-color: var(--sp-accent);
    }
    .sp-textarea { min-height: 120px; resize: vertical; }
    
    /* Upload Box */
    .sp-upload-box {
        border: 2px dashed var(--sp-border); border-radius: 16px; padding: 30px; text-align: center;
        background: rgba(0,0,0,0.2); cursor: pointer; transition: all 0.3s; position: relative;
    }
    .sp-upload-box:hover { border-color: var(--sp-accent); background: rgba(56,189,248,0.05); }
    .sp-upload-box input { display: none; }
    .sp-upload-icon { font-size: 32px; color: var(--sp-accent); margin-bottom: 10px; }
    .sp-upload-text { font-size: 14px; font-weight: 600; color: var(--sp-text-muted); }
    .sp-preview { width: 100%; max-height: 200px; object-fit: contain; border-radius: 12px; display: none; }
    
    /* Buttons */
    .sp-btn {
        width: 100%; border: none; padding: 18px; border-radius: 14px; font-family: 'Tajawal', sans-serif;
        font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .sp-btn-primary {
        background: linear-gradient(135deg, var(--sp-accent), #0ea5e9); color: #000;
        box-shadow: 0 10px 20px -5px var(--sp-accent-glow);
    }
    .sp-btn-primary:hover {
        transform: translateY(-2px); box-shadow: 0 15px 25px -5px var(--sp-accent-glow);
    }
    .sp-btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    
    /* Alerts & Results */
    .ticket-result, .ticket-tracking-result { display: none; padding: 20px; border-radius: 16px; margin-top: 25px; text-align: center; }
    .ticket-result.error, .ticket-tracking-result.error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
    
    /* Saved Tickets UI */
    #saved-tickets-container { margin-bottom: 30px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 16px; display: none;}
    #saved-tickets-container h3 { font-size: 15px; margin: 0 0 15px; color: var(--sp-text-muted); text-align: center; }
    #saved-tickets-list { display: flex; flex-direction: column; gap: 10px; }
    
    /* Detailed Card (Track) */
    .sp-detail-card {
        background: rgba(0,0,0,0.4); border: 1px solid var(--sp-border); border-radius: 16px;
        padding: 25px; margin-top: 25px; display: none; text-align: right; animation: spFadeIn 0.5s ease;
    }
    .sp-detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed var(--sp-border); align-items: center;}
    .sp-detail-row:last-child { border-bottom: none; }
    .sp-label { font-size: 14px; color: var(--sp-text-muted); }
    .sp-value { font-size: 15px; font-weight: 700; color: #fff; }
    .sp-value.code { color: var(--sp-accent); font-family: monospace; font-size: 18px; letter-spacing: 1px;}
    
    .status-badge {
        padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 800;
    }
    .status-pending { background: rgba(234, 179, 8, 0.15); color: #fde047; border: 1px solid rgba(234,179,8,0.3); }
    .status-replied { background: rgba(34, 197, 94, 0.15); color: #86efac; border: 1px solid rgba(34,197,94,0.3); }
    
    .reply-box {
        margin-top: 20px; background: rgba(14, 165, 233, 0.1); border: 1px solid rgba(14, 165, 233, 0.3);
        border-radius: 16px; padding: 25px; position: relative;
    }
    .reply-box h4 { margin: 0 0 15px; font-size: 15px; color: var(--sp-accent); display: flex; align-items: center; gap: 8px;}
    .reply-content { font-size: 15px; line-height: 1.8; color: #f8fafc; }
    
    /* Spinner */
    .spinner {
        width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.2); border-left-color: #000;
        border-radius: 50%; display: none; animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Home Btn */
    .btn-home {
        display: inline-flex; align-items: center; gap: 8px; color: var(--sp-text-muted);
        text-decoration: none; font-size: 14px; font-weight: 700; transition: color 0.3s;
        margin-bottom: 20px;
    }
    .btn-home:hover { color: var(--sp-accent); }
    
    @media (max-width: 600px) {
        .sp-card { padding: 25px; border-radius: 0; min-height: 100vh; border: none; }
        .sp-wrapper { padding: 0; }
        .sp-tabs { flex-direction: column; gap: 5px;}
        .sp-detail-row { flex-direction: column; align-items: flex-start; gap: 8px;}
    }
  </style>

</head>
<body>

<div class="sp-wrapper">
    <div class="sp-card">
        
        <a href="../" class="btn-home">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M21 11H6.83l3.58-3.59L9 6l-6 6 6 6 1.41-1.41L6.83 13H21v-2z"/></svg>
            العودة للرئيسية
        </a>

        <div class="sp-header">
            <h1>دعم <span>SpinBetter</span> الفني</h1>
            <p>نحن هنا لمساعدتك على مدار الساعة، بكفاءة وسرعة احترافية.</p>
        </div>

        <div class="sp-tabs">
            <div class="ticket-tab active" onclick="switchTicketTab('create')">✍️ فتح تذكرة جديدة</div>
            <div class="ticket-tab" onclick="switchTicketTab('track')">🔍 متابعة حالة الطلب</div>
        </div>

        <!-- CREATE TICKET TAB -->
        <div id="tab-create" class="ticket-tab-content active">
            <form id="create-ticket-form">
                
                <div class="sp-form-group">
                    <label>الاسم بالكامل <span>*</span></label>
                    <input type="text" id="ticket-name" class="sp-input" placeholder="اكتب اسمك الحقيقي للتواصل..." required>
                </div>
                
                <div class="sp-form-group">
                    <label>نوع المشكلة أو الاستفسار <span>*</span></label>
                    <select id="ticket-issue" class="sp-select" required>
                        <option value="" disabled selected>-- اختر التصنيف المناسب --</option>
                        <option value="مشكلة في الإيداع (Deposit Issue)">مشكلة في الإيداع (Deposit Issue)</option>
                        <option value="مشكلة في السحب (Withdraw Issue)">مشكلة في السحب (Withdraw Issue)</option>
                        <option value="استفسار عن البونص (Bonus Query)">استفسار عن البونص (Bonus Query)</option>
                        <option value="توثيق الحساب (KYC/Verification)">توثيق الحساب (Account Verification)</option>
                        <option value="مشكلة تقنية (Technical Issue)">عطل فني في الموقع أو لعبة (Technical)</option>
                        <option value="أخرى (Other)">أسباب أخرى</option>
                    </select>
                </div>

                <div class="sp-form-group">
                    <label>شرح تفصيلي للمشكلة <span>*</span></label>
                    <textarea id="ticket-message" class="sp-textarea" placeholder="يرجى توضيح المشكلة بدقة ليمكننا حلها فوراً..." required></textarea>
                </div>

                <div class="sp-form-group">
                    <label>صورة أو إثبات (اختياري)</label>
                    <label for="ticket-image" class="sp-upload-box">
                        <div id="upload-placeholder">
                            <div class="sp-upload-icon">📸</div>
                            <div class="sp-upload-text">اضغط هنا لإرفاق لقطة شاشة تدعم طلبك (Max 5MB)</div>
                        </div>
                        <img id="preview-image" class="sp-preview" alt="معاينة الصورة المرفقة">
                        <input type="file" id="ticket-image" accept="image/png, image/jpeg, image/jpg, image/webp">
                    </label>
                </div>

                <button type="submit" id="submitBtn" class="sp-btn sp-btn-primary">
                    إرسال التذكرة الآن
                    <div class="spinner" id="submitSpinner"></div>
                </button>
                
                <div id="ticket-result" class="ticket-result"></div>
            </form>
        </div>

        <!-- TRACK TICKET TAB -->
        <div id="tab-track" class="ticket-tab-content">
            
            <div id="saved-tickets-container">
                <h3>تذاكرك المحفوظة مؤخراً 📌</h3>
                <div id="saved-tickets-list"></div>
            </div>

            <form id="track-ticket-form">
                <div class="sp-form-group">
                    <label>رقم التذكرة (Tracking Code) <span>*</span></label>
                    <input type="text" id="track-code" class="sp-input" placeholder="مثال: TCK-XYZ123" required style="text-align: left; direction: ltr; font-weight: bold; font-family: monospace; font-size: 18px;">
                </div>

                <button type="submit" id="trackBtn" class="sp-btn sp-btn-primary">
                    استعلام عن الحالة
                    <div class="spinner" id="trackSpinner"></div>
                </button>
            </form>

            <div id="track-result" class="ticket-tracking-result"></div>

            <div id="ticket-details-card" class="sp-detail-card">
                <div class="sp-detail-row">
                    <span class="sp-label">رقم التذكرة المرجعي</span>
                    <span class="sp-value code" id="detail-code">---</span>
                </div>
                <div class="sp-detail-row">
                    <span class="sp-label">اسم العميل</span>
                    <span class="sp-value" id="detail-name">---</span>
                </div>
                <div class="sp-detail-row">
                    <span class="sp-label">نوع الطلب</span>
                    <span class="sp-value" id="detail-issue">---</span>
                </div>
                <div class="sp-detail-row">
                    <span class="sp-label">الحالة الحالية</span>
                    <span id="detail-status" class="status-badge status-pending">---</span>
                </div>

                <div id="detail-reply-section" class="reply-box" style="display: none;">
                    <h4>
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99A5.5 5.5 0 1012 1a5.5 5.5 0 000 11zM11 14h2v3h-2zm0-5h2v4h-2z"/></svg>
                        الرد الرسمي من الدعم الفني:
                    </h4>
                    <div id="detail-reply" class="reply-content"></div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
